on: pull_request

name: Commit checks

permissions:
  pull-requests: read

jobs:
  message-check:
    name: Block Autosquash Commits
    runs-on: ubuntu-latest
    steps:
      - uses: xt0rted/block-autosquash-commits-action@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
