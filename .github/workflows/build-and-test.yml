name: Build and test

on:
  push:
    branches: [main]
    tags: '*'
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  GIT_CONFIG_PARAMETERS: "'color.ui=always'"

jobs:
  lint:
    name: Rust lints and tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repo
      uses: actions/checkout@v5
    - name: Check if code is well formatted
      run: cargo fmt --check
    - name: run `cargo check`
      run: RUSTFLAGS="-D warnings" cargo check --workspace
    - name: run `cargo clippy`
      run: cargo clippy --workspace -- --deny clippy::all
    - name: run `cargo doc`
      run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --workspace
    - name: run `cargo test`
      run: cargo test

  check-hw-backends:
    name: Check hardware back-ends compile
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repo
      uses: actions/checkout@v5
    - name: Add embedded target
      run: rustup target add thumbv8m.main-none-eabihf
    - name: cargo check nRF54L15 (lib + tests)
      working-directory: embedded-cal-nrf54l15
      run: cargo check --tests
    - name: cargo check STM32WBA55 (lib + tests)
      working-directory: embedded-cal-stm32wba55
      run: cargo check --tests

