name: Metadata checks

on:
  push:
    branches: [main]
    tags: '*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reuse:
    name: Check license annotations (SPDX / reuse.software)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: fsfe/reuse-action@v6
